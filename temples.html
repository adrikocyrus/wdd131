<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Temple Album</title>

    <meta name="description" content="A Temple Album page displaying temples from around the world.">
    <meta name="author" content="Adriko Cyrus">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="styles/temples.css">
    <link rel="stylesheet" href="styles/temples-large.css">

    <script src="scripts/temples.js" defer></script>
</head>

<body>
    <header>
        <div class="Temple-Album">
            <h1>Temple Album</h1>
        </div>
        
        
        <button id="menuButton" aria-label="Open Menu">
            ☰
        </button>
        
        <nav id="navigation">
            <a href="#">Home</a>
            <a href="#">Old</a>
            <a href="#">New</a>
            <a href="#">Large</a>
            <a href="#">Small</a>
        </nav>
    </header>
    
    <main>
        <h1>Temples</h1>
        
        <div class="temple-grid">
            <figure>
                <img src="images/temple-placeholder.jpeg" alt="Salt Lake Temple">
                <figcaption>Salt Lake Temple</figcaption>
            </figure>
            
            <figure>
                <img src="images/temple-placeholder1.jpeg" alt="Washington D.C. Temple">
                <figcaption>Washington D.C. Temple</figcaption>
            </figure>
            
            <figure>
                <img src="images/temple-placeholder2.jpeg" alt="London England Temple">
                <figcaption>London England Temple</figcaption>
            </figure>
            
            <figure>
                <img src="images/temple-placeholder3.jpeg" alt="Rome Italy Temple">
                <figcaption>Rome Italy Temple</figcaption>
            </figure>
            
            <figure>
                <img src="images/temple-placeholder4.jpeg" alt="Paris France Temple">
                <figcaption>Paris France Temple</figcaption>
            </figure>
            
            <figure>
                <img src="images/temple-placeholder5.jpeg" alt="Tokyo Japan Temple">
                <figcaption>Tokyo Japan Temple</figcaption>
            </figure>
            
            <figure>
                <img src="images/temple-placeholder6.jpeg" alt="Sydney Australia Temple">
                <figcaption>Sydney Australia Temple</figcaption>
            </figure>
            
            <figure>
                <img src="images/temple-placeholder7.jpeg" alt="Mexico City Mexico Temple">
                <figcaption>Mexico City Mexico Temple</figcaption>
            </figure>
            
            <figure>
                <img src="images/temple-placeholder8.jpeg" alt="São Paulo Brazil Temple">
                <figcaption>São Paulo Brazil Temple</figcaption>
            </figure>
        </div>
    </main>
    
    <footer>
        <p>
            &copy; <span id="currentyear"></span> Adriko Cyrus | Uganda
        </p>
        <p id="lastModified"></p>
    </footer>
</body>
</html>
